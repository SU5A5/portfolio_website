<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7BB8F0"/>
      <stop offset="100%" stop-color="#3A8FE8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="60" fill="#07080C"/>

  <!-- Inner box -->
  <rect x="40" y="40" width="320" height="320" rx="32" fill="#0E1E30" stroke="#2060A0" stroke-width="3"/>

  <!-- SG Text -->
  <text x="200" y="290"
    text-anchor="middle"
    font-family="'Syne', Arial Black, sans-serif"
    font-weight="800"
    font-size="230"
    letter-spacing="-8"
    fill="url(#sg-grad)">SG</text>
</svg>
